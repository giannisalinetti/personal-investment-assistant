<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PIA{% endblock %} — Personal Investment Assistant</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("pia-theme");
        var theme = stored === "dark" || stored === "light" ? stored : "light";
        document.documentElement.setAttribute("data-theme", theme);
      } catch (_) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=8">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/{{ token_query }}" aria-label="PIA">
      <img src="/static/pia.png" alt="PIA" class="brand-logo" width="96" height="40">
    </a>
    <nav>
      <a href="/{{ token_query }}" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/advisor{{ token_query }}" class="{% if active == 'advisor' %}active{% endif %}">Advisor</a>
      <a href="/settings{{ token_query }}" class="{% if active == 'settings' %}active{% endif %}">Settings</a>
      <a href="/about{{ token_query }}" class="{% if active == 'about' %}active{% endif %}">About</a>
    </nav>
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle night mode">Night</button>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p class="disclaimer">{{ disclaimer }}</p>
  </footer>
  <script src="/static/common.js?v=6"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
