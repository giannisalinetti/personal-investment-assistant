# Override for --profile gpu (real vLLM).
# Usage:
#   podman compose -f docker/compose.yml -f docker/compose.gpu.yml --profile gpu up -d --build

services:
  pia-web:
    environment:
      PIA_LLM_PROVIDER: vllm
      OPENAI_BASE_URL: http://vllm:8000/v1
      OPENAI_API_KEY: not-needed
      OPENAI_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-8B}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-8B}
      LLM_BASE_URL: http://vllm:8000/v1
      PIA_WEB_HOST: "0.0.0.0"
      LOG_TO_CONSOLE: "true"
    depends_on:
      vllm:
        condition: service_healthy

  pia-run:
    environment:
      PIA_LLM_PROVIDER: vllm
      OPENAI_BASE_URL: http://vllm:8000/v1
      OPENAI_API_KEY: not-needed
      OPENAI_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-8B}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-8B}
      LLM_BASE_URL: http://vllm:8000/v1
      LOG_TO_CONSOLE: "true"
    depends_on:
      vllm:
        condition: service_healthy

  pia-bot:
    environment:
      PIA_LLM_PROVIDER: vllm
      OPENAI_BASE_URL: http://vllm:8000/v1
      OPENAI_API_KEY: not-needed
      OPENAI_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-8B}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-8B}
      LLM_BASE_URL: http://vllm:8000/v1
      LOG_TO_CONSOLE: "true"
    depends_on:
      vllm:
        condition: service_healthy

