# Ofelia schedules Monitor runs against the pia:local image on the pia network.
# Enable with: --profile schedule
# Requires Docker/Podman socket access and image pia:local already built.
#
# Timezone for cron: host/container local (set TZ on ofelia if needed).
# Europe/Rome market slots ≈ 08:00 / 13:00 / 17:30

[job-run "pia-pre-market"]
schedule = 0 0 8 * * *
image = localhost/pia:local
network = pia
command = pia-run --run-type pre_market
volume = pia_pia-data:/app/data
volume = pia_pia-logs:/app/logs
volume = pia_pia-cache:/app/.cache
environment = ["LOG_TO_CONSOLE=true"]

[job-run "pia-midday"]
schedule = 0 0 13 * * *
image = localhost/pia:local
network = pia
command = pia-run --run-type midday
volume = pia_pia-data:/app/data
volume = pia_pia-logs:/app/logs
volume = pia_pia-cache:/app/.cache
environment = ["LOG_TO_CONSOLE=true"]

[job-run "pia-end-of-day"]
schedule = 0 30 17 * * *
image = localhost/pia:local
network = pia
command = pia-run --run-type end_of_day
volume = pia_pia-data:/app/data
volume = pia_pia-logs:/app/logs
volume = pia_pia-cache:/app/.cache
environment = ["LOG_TO_CONSOLE=true"]
