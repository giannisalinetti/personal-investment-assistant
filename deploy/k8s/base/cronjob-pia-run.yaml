apiVersion: batch/v1
kind: CronJob
metadata:
  name: pia-run-pre-market
  namespace: pia
spec:
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: pia-run
              image: pia:local
              imagePullPolicy: IfNotPresent
              command: ["pia-run", "--run-type", "pre_market"]
              envFrom:
                - configMapRef:
                    name: pia-config
                - secretRef:
                    name: pia-secrets
                    optional: true
              volumeMounts:
                - name: data
                  mountPath: /app/data
                - name: logs
                  mountPath: /app/logs
                - name: watchlists
                  mountPath: /app/watchlists
                  readOnly: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: pia-data
            - name: logs
              persistentVolumeClaim:
                claimName: pia-logs
            - name: watchlists
              configMap:
                name: pia-watchlists
---
