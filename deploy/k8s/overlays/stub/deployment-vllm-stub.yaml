# Stub LLM published as Service `vllm` so OPENAI_BASE_URL=http://vllm:8000/v1 stays stable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: pia
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: llm-stub
          image: pia-llm-stub:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: pia
spec:
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: http
