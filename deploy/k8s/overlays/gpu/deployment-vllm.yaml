# Real vLLM on NVIDIA GPU nodes. Service name remains `vllm`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: pia
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "Qwen/Qwen3-8B"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pia-secrets
                  key: HUGGING_FACE_HUB_TOKEN
                  optional: true
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 30
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
              memory: 24Gi
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: vllm-hf-cache
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-hf-cache
  namespace: pia
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: pia
spec:
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: http
